<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectoQuest | Gamified Voter Registration</title>
    <meta name="description"
        content="Embark on the ultimate quest to become a registered voter. Forge your legacy, earn badges, and prepare for the polls.">
    <link rel="stylesheet" href="style_v4.css?v=1.0.2">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <!-- Top Progress Bar -->
        <div id="top-progress-container" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Journey Progress">
            <div id="top-progress-bar"></div>
        </div>
    </header>

    <main>
        <!-- Level Up Overlay -->
    <div id="level-up-overlay">
        <h1 id="level-up-text">LEVEL UP!</h1>
    </div>

        <!-- Auth Section -->
        <section id="auth-section" aria-labelledby="auth-title">
            <h1 class="hero-title" id="auth-title">ElectoQuest</h1>
            <article class="config-card">
                <div id="login-view">
                    <h2 class="section-title">Login</h2>
                    <div class="input-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter username" aria-required="true">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter password" aria-required="true">
                    </div>
                    <div id="login-error" class="error-msg hidden" role="alert"></div>
                    <button id="btn-login" class="btn-primary" aria-label="Login to My Quest">Login to My Quest</button>
                    <p class="auth-toggle">New hero? <button class="link-btn" id="show-signup" aria-label="Go to Sign Up">Create an Account</button></p>
                </div>

                <div id="signup-view" class="hidden">
                    <h2 class="section-title">Sign Up</h2>
                    <div class="input-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" placeholder="Choose a username" aria-required="true">
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Choose a password" aria-required="true">
                    </div>
                    <div id="signup-error" class="error-msg hidden" role="alert"></div>
                    <button id="btn-signup" class="btn-primary" aria-label="Forge My Identity">Forge My Identity</button>
                    <p class="auth-toggle">Already a hero? <button class="link-btn" id="show-login" aria-label="Go to Login">Login</button></p>
                </div>
            </article>
        </section>

        <!-- Onboarding Section -->
        <section id="landing" class="hidden" aria-labelledby="onboarding-title">
            <h1 class="hero-title" id="onboarding-title">ElectoQuest</h1>
            <p class="hero-subtitle">Empower the world's largest democracy. Your quest to become an informed voter begins here.</p>
            <br>
            <article class="config-card">
                <div class="input-group">
                    <label for="user-state">Choose Your State</label>
                    <select id="user-state" aria-required="true">
                        <option value="">Select State...</option>
                        <option value="MH">Maharashtra</option>
                        <option value="KA">Karnataka</option>
                        <option value="DL">Delhi</option>
                        <option value="TN">Tamil Nadu</option>
                        <option value="UP">Uttar Pradesh</option>
                        <option value="WB">West Bengal</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="user-pincode">Pincode</label>
                    <input type="text" id="user-pincode" placeholder="Enter 6-digit Pincode" aria-required="true">
                </div>
                <button id="btn-begin" class="btn-primary" aria-label="Begin My Quest">Begin My Quest</button>
            </article>
        </section>

        <!-- Dashboard -->
        <section id="dashboard" class="hidden" aria-label="User Dashboard">
            <header class="dashboard-header">
                <div class="header-left">
                    <div class="logo">ELECTOQUEST</div>
                    <div class="user-greeting">Greetings, <span id="display-username">Hero</span></div>
                </div>
                <div class="header-right">
                    <button id="btn-logout" class="btn-outline" aria-label="Logout">Logout</button>
                </div>
            </header>

        <div class="dashboard-grid">
                <!-- Left Side: Spiral Map -->
                <article class="map-section" aria-label="Quest Map">
                    <div class="spiral-container" id="spiral-map">
                        <div class="map-path-svg" aria-hidden="true">
                            <svg width="100%" height="100%" viewBox="0 0 500 500">
                                <path id="spiral-path"
                                    d="M250,250 C300,150 450,250 400,400 C300,550 50,450 100,250 C150,100 350,50 450,250"
                                    fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-dasharray="5,5" />
                            </svg>
                        </div>

                        <button class="node unlocked" data-quest="1" style="--x: 250px; --y: 250px;" aria-label="Quest 1: Registration" aria-expanded="false" tabindex="0">
                            <i class="fas fa-feather-pointed" aria-hidden="true"></i>
                            <span class="node-label">Registration</span>
                        </button>
                        <button class="node locked" data-quest="2" style="--x: 320px; --y: 180px;" aria-label="Quest 2: Polling Station" aria-disabled="true" tabindex="-1">
                            <i class="fas fa-compass" aria-hidden="true"></i>
                            <span class="node-label">Polling Station</span>
                        </button>
                        <button class="node locked" data-quest="3" style="--x: 410px; --y: 260px;" aria-label="Quest 3: Candidates" aria-disabled="true" tabindex="-1">
                            <i class="fas fa-users-rectangle" aria-hidden="true"></i>
                            <span class="node-label">Candidates</span>
                        </button>
                        <button class="node locked" data-quest="4" style="--x: 370px; --y: 380px;" aria-label="Quest 4: Manifestos" aria-disabled="true" tabindex="-1">
                            <i class="fas fa-book-open" aria-hidden="true"></i>
                            <span class="node-label">Manifestos</span>
                        </button>
                        <button class="node locked" data-quest="5" style="--x: 240px; --y: 430px;" aria-label="Quest 5: Voting Plan" aria-disabled="true" tabindex="-1">
                            <i class="fas fa-shield-halved" aria-hidden="true"></i>
                            <span class="node-label">Voting Plan</span>
                        </button>
                        <button class="node locked" data-quest="6" style="--x: 120px; --y: 360px;" aria-label="Quest 6: BLO Connect" aria-disabled="true" tabindex="-1">
                            <i class="fas fa-eye" aria-hidden="true"></i>
                            <span class="node-label">BLO Connect</span>
                        </button>
                        <button class="node locked" data-quest="7" style="--x: 100px; --y: 210px;" aria-label="Quest 7: Awareness" aria-disabled="true" tabindex="-1">
                            <i class="fas fa-bullhorn" aria-hidden="true"></i>
                            <span class="node-label">Awareness</span>
                        </button>
                        <button class="node locked" data-quest="8" style="--x: 220px; --y: 80px;" aria-label="Quest 8: Final Pillar" aria-disabled="true" tabindex="-1">
                            <i class="fas fa-monument" aria-hidden="true"></i>
                            <span class="node-label">Final Pillar</span>
                        </button>
                    </div>
                </article>

                <!-- Right Side: Rewards & Status -->
                <aside class="rewards-section" aria-label="Rewards and Status">
                    <article class="stats-card">
                        <div class="xp-display-large" aria-live="polite">
                            <span class="xp-label">Civic XP</span>
                            <span id="xp-counter" class="xp-value">0</span>
                        </div>
                    </article>    
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-fill"></div>
                    </div>

                    <article class="armory-panel" aria-label="Badge Armory">
                        <h2 class="armory-title">The Rewards Armory</h2>
                        <div class="badge-grid" role="list">
                            <div class="badge-item" id="badge_registration" role="listitem">
                                <img src="https://storage.googleapis.com/electoquest-assets-silicon-garage-494118-a1/badge_registration.png" alt="Registration Badge">
                                <span class="badge-name">Civic Scribe</span>
                            </div>
                            <div class="badge-item" id="badge_polling" role="listitem">
                                <img src="https://storage.googleapis.com/electoquest-assets-silicon-garage-494118-a1/badge_polling.png" alt="Polling Badge">
                                <span class="badge-name">Pathfinder</span>
                            </div>
                            <div class="badge-item" id="badge_candidates" role="listitem">
                                <img src="https://storage.googleapis.com/electoquest-assets-silicon-garage-494118-a1/badge_candidates.png" alt="Candidates Badge">
                                <span class="badge-name">Truth Seeker</span>
                            </div>
                            <div class="badge-item" id="badge_measures" role="listitem">
                                <img src="https://storage.googleapis.com/electoquest-assets-silicon-garage-494118-a1/badge_measures.png" alt="Measures Badge">
                                <span class="badge-name">Law Keeper</span>
                            </div>
                            <div class="badge-item" id="badge_vote" role="listitem">
                                <img src="https://storage.googleapis.com/electoquest-assets-silicon-garage-494118-a1/badge_vote.png" alt="Vote Badge">
                                <span class="badge-name">Guardian</span>
                            </div>
                        </div>
                    </article>
                </aside>
            </div>
        </section>

        <!-- Quest Modal -->
        <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <article class="modal">
                <button id="modal-close" class="modal-close" aria-label="Close modal">&times;</button>
                <div id="modal-content">
                    <!-- Content injected by JS -->
                </div>
            </article>
        </div>
    </main>

    <script src="script_v4.js?v=1.0.2"></script>
</body>

</html>
